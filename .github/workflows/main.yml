name: CodeLogic Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-scan:
    name: Build + CodeLogic Scan
    runs-on: ubuntu-latest
    environment: CodeLogic Scan Env

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (no cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          BUILD_LOG="${GITHUB_WORKSPACE}/build.log"
          echo "BUILD_LOG=${BUILD_LOG}" >> "$GITHUB_ENV"
          mvn -B -ntp clean package \
            -DskipTests \
            -Dcheckstyle.skip=true \
            -Denforcer.skip=true \
            -Djacoco.skip=true \
            -Dspring-javaformat.skip=true \
            -Dcyclonedx.skip=true \
            |& tee "${BUILD_LOG}"

      - name: Run CodeLogic Scan
        uses: CodeLogicIncEngineering/codelogic-java-agent-github-action@master
        with:
          codelogic_host:        ${{ vars.CODELOGIC_HOST }}
          agent_uuid:            ${{ secrets.AGENT_UUID }}
          agent_password:        ${{ secrets.AGENT_PASSWORD }}
          application_name:      "petclinic"
          method_filter:         "org.springframework.samples"
          expunge_scan_sessions: true

      - name: Send CodeLogic Build Info
        if: always()
        uses: CodeLogicIncEngineering/codelogic-send-build-info-github-action@master
        with:
          codelogic_host: ${{ vars.CODELOGIC_HOST }}
          agent_uuid:     ${{ secrets.AGENT_UUID }}
          agent_password: ${{ secrets.AGENT_PASSWORD }}
          job_name:       "CodeLogic Send Build Info"
          build_number:   "${{ github.run_number }}"
          build_status:   "${{ job.status }}"
          log_file:       "/github/workspace/build.log"
          log_lines:      "50000"
