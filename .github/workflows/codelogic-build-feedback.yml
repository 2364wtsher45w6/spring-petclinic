# codelogic-build-feedback
name: CodeLogic Build Feedback

on:
  push:
    branches:
      - main
      - develop
      - 'codelogic/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        id: build
        run: |
          set +e
          mvn clean install 2>&1 | tee build.log
          BUILD_STATUS=$?
          if [ $BUILD_STATUS -eq 0 ]; then
            echo "build_status=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "build_status=FAILURE" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Send build info to CodeLogic
        if: always()
        uses: CodeLogicIncEngineering/codelogic-send-build-info-github-action@main
        with:
          server-url: ${{ secrets.CODELOGIC_HOST }}
          agent-uuid: ${{ secrets.AGENT_UUID }}
          agent-password: ${{ secrets.AGENT_PASSWORD }}
          log-file: build.log
          pipeline-system: 'GitHub Actions'
          job-name: ${{ github.workflow }}
          build-number: ${{ github.run_number }}
          build-status: ${{ steps.build.outputs.build_status }}
